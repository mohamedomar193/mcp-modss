# Reverse proxy for MCP server. Proxies all traffic to mcp-server:8000.
# MCP endpoint: http://host/mcp (or https://host/mcp with TLS in front).

events {
    worker_connections 1024;
}

http {
    # Compress text/JSON responses
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types application/json text/plain text/css application/javascript;

    upstream mcp_backend {
        server mcp-server:8000;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            proxy_pass http://mcp_backend;
            proxy_http_version 1.1;
            # Forward Host as upstream so backend accepts (avoids "Invalid Host header")
            proxy_set_header Host $proxy_host;
            # MCP server requires Accept: text/event-stream (GET/SSE) and application/json (POST)
            proxy_set_header Accept "text/event-stream, application/json";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Required for MCP streaming / long-lived responses
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
