# Reverse proxy: /mcp -> mcp-server:8000, /ingest -> ingest:8787.
# MCP: http://host/mcp  |  Ingest (n8n): http://host/ingest

events {
    worker_connections 1024;
}

http {
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types application/json text/plain text/css application/javascript;

    upstream mcp_backend {
        server mcp-server:8000;
    }

    upstream ingest_backend {
        server ingest:8787;
    }

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location /ingest {
            proxy_pass http://ingest_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://mcp_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $proxy_host;
            proxy_set_header Accept "text/event-stream, application/json";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}
