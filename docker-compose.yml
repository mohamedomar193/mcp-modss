# MCP server + nginx. Exposes port 80; nginx proxies to the MCP app.
# Usage: copy env.example to .env, set DATABASE_URL, then:
#   docker compose up -d
# Cursor connects to http://localhost/mcp (or https://your-host/mcp with TLS in front).

services:
  mcp-server:
    build: .
    image: mcp-server:latest
    environment:
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped
    # Healthcheck from Dockerfile; no host ports — only nginx talks to this container.

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      mcp-server:
        condition: service_healthy
    restart: unless-stopped
