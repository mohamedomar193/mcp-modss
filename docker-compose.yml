# MCP server + Postgres + ingest + nginx. Exposes port 80; nginx proxies /mcp and /ingest.
# Usage: copy env.example to .env, set DATABASE_URL and INGEST_TOKEN, then:
#   docker compose up -d
# Cursor: http://localhost/mcp  |  n8n webhook: http://localhost/ingest

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: mcp_tasks
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp_tasks"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  mcp-server:
    build: .
    image: mcp-server:latest
    command: ["uvicorn", "mcp_server:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ingest:
    image: mcp-server:latest
    command: ["uvicorn", "ingest_server:app", "--host", "0.0.0.0", "--port", "8787"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - INGEST_TOKEN=${INGEST_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',8787)); s.close()"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mcp-server
      - ingest
    restart: unless-stopped

volumes:
  postgres_data:
