# MCP server + Postgres + ingest.
# Host Nginx (outside Docker) proxies:
#   /mcp    -> 127.0.0.1:3000
#   /ingest -> 127.0.0.1:3001

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mcp_tasks
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp_tasks"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  mcp-server:
    build: .
    image: mcp-server:latest
    command: ["uvicorn", "mcp_server:app", "--host", "0.0.0.0", "--port", "3000"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@mcp-server-postgres-1:5432/mcp_tasks
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',3000)); s.close()"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

  ingest:
    image: mcp-server:latest
    command: ["uvicorn", "ingest_server:app", "--host", "0.0.0.0", "--port", "3001"]
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@mcp-server-postgres-1:5432/mcp_tasks
      - INGEST_TOKEN=${INGEST_TOKEN}
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1',3001)); s.close()"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

volumes:
  postgres_data:
