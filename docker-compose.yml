# MCP server + ingest + nginx. Exposes port 80; nginx proxies /mcp and /ingest.
# Usage: copy env.example to .env, set DATABASE_URL and INGEST_TOKEN, then:
#   docker compose up -d
# Cursor: http://localhost/mcp  |  n8n webhook: http://localhost/ingest

services:
  mcp-server:
    build: .
    image: mcp-server:latest
    command: ["uvicorn", "mcp_server:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

  ingest:
    image: mcp-server:latest
    command: ["uvicorn", "ingest_server:app", "--host", "0.0.0.0", "--port", "8787"]
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - INGEST_TOKEN=${INGEST_TOKEN}
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - mcp-server
      - ingest
    restart: unless-stopped
